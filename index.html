<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter For You ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>

<audio id="bgMusic" preload="auto" loop>
    <source src="love.mp3" type="audio/mpeg">
</audio>

<section id="envelopePage" class="page active">

    <h3 class="smallTitle">
        A LETTER FOR YOU
    </h3>

    <h1 class="mainTitle">
        Open when you're ready
    </h1>

    <div id="envelope">

        <div class="letterPreview">
            for you ❤️
        </div>

        <div class="flap"></div>

        <div class="seal">
            ❤️
        </div>

    </div>

    <p class="tapText">
        Tap the envelope
    </p>

</section>

<section id="letterPage" class="page">

<div class="letter">

<h2>
My Love ❤️
</h2>

<div id="typingText">

</div>

<button id="continueBtn">
Continue ❤️
</button>

</div>

</section>

<section id="questionPage" class="page">

<div class="questionBox">

<h1>
❤️ Do You Love Me? ❤️
</h1>

<p>
Just one honest answer...
</p>

<button id="yesBtn">
💖 YES 💖
</button>

</div>

</section>

<section id="videoPage" class="page">

<video
id="myVideo"
playsinline
preload="auto">

<source src="Video.mp4" type="video/mp4">

</video>

</section>

<section id="finalPage" class="page">

<h1 class="finalText">

I Love You Forever ❤️

</h1>

</section>

<script src="script.js"></script>

</body>
  </html>
